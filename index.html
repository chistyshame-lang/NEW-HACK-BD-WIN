<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>𝗖𝗛𝗜𝗦𝗧𝗬 𝗕𝗜𝗚 𝗖𝗢𝗠𝗠𝗨𝗡𝗜𝗧𝗬</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw; height: 100vh;
    overflow: hidden;
    background: #05000a;
    font-family: 'Rajdhani', sans-serif;
    position: fixed;
  }
  #site-frame {
    width: 100%; height: 100%;
    border: none; display: block;
  }

  /* --- CHARACTER SIZE REDUCED --- */
  #pet-bot {
    position: absolute; width: 35px; height: 35px;
    z-index: 10001; pointer-events: none;
    transition: all 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
  }
  .bot-core {
    position: relative; width: 16px; height: 16px;
    background: radial-gradient(circle, #bf00ff, #500080);
    margin: 9px auto; border-radius: 50%;
    border: 1.5px solid #fff; box-shadow: 0 0 10px #bf00ff;
    display: flex; justify-content: center; align-items: center;
    z-index: 2;
  }
  .bot-ring {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    border: 1.5px solid rgba(191, 0, 255, 0.6);
    border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
    animation: rotateRing 2s linear infinite;
  }
  .bot-ring.inner {
    width: 80%; height: 80%; top: 10%; left: 10%;
    border-color: #00fbff; animation-direction: reverse; animation-duration: 1.5s;
  }
  
  @keyframes rotateRing { 
    from { transform: rotate(0deg); } 
    to { transform: rotate(360deg); } 
  }
  
  .flying-mode { animation: orbit 6s linear infinite; }
  @keyframes orbit {
    0% { top: -30px; left: -30px; }
    25% { top: -30px; left: 105%; }
    50% { top: 105%; left: 105%; }
    75% { top: 105%; left: -30px; }
    100% { top: -30px; left: -30px; }
  }
  .sitting-mode {
    top: -40px !important; left: 50% !important;
    transform: translateX(-50%); animation: hover 2.5s ease-in-out infinite;
  }
  @keyframes hover { 0%, 100% { margin-top: 0; } 50% { margin-top: -6px; } }
  
  .bot-pulse { animation: pulseAnim 0.6s ease; }
  @keyframes pulseAnim { 
    0% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.3); }
    100% { transform: translateX(-50%) scale(1); }
  }

  /* --- HACK WINDOW SIZE REDUCED --- */
  #overlay-wrapper {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 1000;
    width: 165px; /* Smaller Width */
    touch-action: none;
  }

  #overlay-box {
    position: relative;
    z-index: 1;
    width: 100%;
    background: rgba(15, 5, 25, 0.9);
    backdrop-filter: blur(12px);
    border-radius: 18px;
    padding: 12px; /* Smaller Padding */
    cursor: grab;
    user-select: none;
    border: 1px solid rgba(191, 0, 255, 0.4);
    box-shadow: 0 10px 40px rgba(0,0,0,0.9);
    overflow: hidden;
    touch-action: none;
  }

  /* Scanline effect */
  #overlay-box::before {
    content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
    background: rgba(191, 0, 255, 0.3); animation: scan 4s linear infinite;
    z-index: 0;
  }
  @keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }

  .title-main {
    text-align: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 11px; font-weight: 700;
    color: #fff; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 2px;
    text-shadow: 0 0 8px #bf00ff;
  }
  .title-sub {
    text-align: center; font-size: 7.5px; font-weight: 700;
    color: #00fbff; letter-spacing: 1.5px; margin-bottom: 10px;
    opacity: 0.9;
  }

  /* PERIOD REMOVED via CSS Display None to keep JS logic safe */
  .period-line { display: none; }

  /* LOGIN DESIGN COMPACT */
  #login-section { display: flex; flex-direction: column; align-items: center; position: relative; z-index: 1; }
  .password-input {
    width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(191, 0, 255, 0.4);
    border-radius: 8px; padding: 7px; color: #fff; font-size: 10px;
    outline: none; margin-bottom: 8px; text-align: center;
    font-family: 'Orbitron', sans-serif;
  }
  .btn-login {
    width: 100%; background: linear-gradient(45deg, #bf00ff, #ff00d4); color: #fff;
    font-weight: 900; font-size: 10px; text-transform: uppercase;
    border: none; border-radius: 8px; padding: 8px; cursor: pointer;
  }

  /* PREDICTION AREA DESIGN COMPACT */
  #pred-section { display: none; position: relative; z-index: 1; }
  .next-signal { text-align: center; font-size: 10px; font-weight: 700; color: #ccc; margin-bottom: 6px; }
  .next-signal span { color: #00fbff; }

  .prediction-label { 
    text-align: center; margin-bottom: 8px; 
    padding: 4px; background: rgba(255,255,255,0.05); border-radius: 10px;
  }
  .pred-value { font-family: 'Orbitron', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: 0.5px; }
  .pred-small { color: #00fbff; text-shadow: 0 0 10px rgba(0, 251, 255, 0.7); }
  .pred-big   { color: #ffaa00; text-shadow: 0 0 10px rgba(255, 170, 0, 0.7); }

  .pred-number-wrap { display: flex; justify-content: center; margin-bottom: 8px; }
  .pred-number-box {
    width: 40px; height: 40px; line-height: 36px; border-radius: 50%;
    text-align: center; font-size: 20px; font-weight: 900; color: #fff;
    border: 2px solid #fff; position: relative;
  }
  .pred-number-box.green { background: radial-gradient(#bf00ff, #2a0035); box-shadow: 0 0 15px #bf00ff; }
  .pred-number-box.red { background: radial-gradient(#ffaa00, #442200); box-shadow: 0 0 15px #ffaa00; }

  .btn-telegram {
    width: 100%; background: transparent; border: 1px solid rgba(255, 255, 255, 0.15);
    color: #fff; font-weight: 700; font-size: 9px; border-radius: 8px;
    padding: 7px; text-decoration: none; display: block; text-align: center;
    transition: 0.3s; margin-top: 5px;
  }
</style>

<body>
<iframe id="site-frame" src="https://bdwin24.biz?inviteCode=ZXS3GVN&from=web"></iframe>

<div id="overlay-wrapper">
  <!-- CHARACTER -->
  <div id="pet-bot" class="flying-mode">
    <div class="bot-ring"></div>
    <div class="bot-ring inner"></div>
    <div class="bot-core">
      <div style="width:3px; height:3px; background:#fff; border-radius:50%;"></div>
    </div>
  </div>

  <canvas id="neon-canvas" style="position:absolute;inset:-3px;border-radius:20px;pointer-events:none;z-index:2;"></canvas>
  
  <div id="overlay-box">
    <div class="title-main">𝗦𝗖 𝗕𝗜𝗚 𝗖𝗢𝗠𝗠𝗨𝗡𝗜𝗧𝗬</div>
    <div class="title-sub">PREMIUM V4.0</div>
    
    <div id="login-section">
      <input class="password-input" type="password" id="pw-input" placeholder="KEY" autocomplete="off" />
      <button class="btn-login" onclick="doLogin()">Unlock</button>
    </div>
    
    <div id="pred-section">
      <div class="period-line" id="period-display">SYNCING...</div>
      <div class="next-signal">REFRESH: <span id="countdown">30s</span></div>
      
      <div class="prediction-label">
        <span class="pred-value pred-small" id="pred-label">...</span>
      </div>

      <div class="pred-number-wrap">
        <div class="pred-number-box green" id="pred-box">?</div>
      </div>
    </div>

    <a class="btn-telegram" href="https://t.me/+8Nz94X9m9iE1Y2Rl" target="_blank">JOIN TELEGRAM</a>
  </div>
</div>

<script>
  const SECRET_PASS = "NEWHACK22"; 
  const bot = document.getElementById('pet-bot');

  function doLogin() {
    const pw = document.getElementById('pw-input').value.trim();
    if (pw === SECRET_PASS) {
      showPrediction();
      bot.classList.remove('flying-mode');
      bot.classList.add('sitting-mode');
    }
  }

  function showPrediction() {
    document.getElementById('login-section').style.display = 'none';
    document.getElementById('pred-section').style.display  = 'block';
    startPrediction();
  }

  function botAction() {
    bot.classList.add('bot-pulse');
    setTimeout(() => bot.classList.remove('bot-pulse'), 600);
  }

  let currentWin = -1;

  async function fetchHistoryData() {
    try {
      const ts = Date.now();
      const res = await fetch(`https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json?ts=${ts}`);
      const data = await res.json();
      return data;
    } catch(e) { return null; }
  }

  function getAnalyzedResult(historyData) {
    if (!historyData || !historyData.data || !historyData.data.list || historyData.data.list.length < 2) {
        return { isSmall: true, finalNum: 2 };
    }
    const list = historyData.data.list;
    const n1 = parseInt(list[0].number);
    const n2 = parseInt(list[1].number);
    const finalNum = (n1 + n2) % 10;
    const isSmall = finalNum < 5;
    return { isSmall, finalNum };
  }

  function startPrediction() {
    async function tick() {
      const now = new Date();
      const rem = 30 - (now.getSeconds() % 30);
      document.getElementById('countdown').textContent = rem + 's';

      if (rem === 30 || currentWin === -1) {
        currentWin = 0;
        const history = await fetchHistoryData();
        
        if (history && history.data && history.data.list.length > 0) {
            const result = getAnalyzedResult(history);
            const lbl = document.getElementById('pred-label');
            const box = document.getElementById('pred-box');
            
            box.textContent = result.finalNum;
            lbl.textContent = result.isSmall ? 'SMALL' : 'BIG';
            lbl.className = result.isSmall ? 'pred-value pred-small' : 'pred-value pred-big';
            box.className = result.isSmall ? 'pred-number-box green' : 'pred-number-box red';
            
            botAction();
        }
      }
    }
    tick();
    setInterval(tick, 1000);
  }

  (function() {
    function initCanvas() {
      const wrapper = document.getElementById('overlay-wrapper');
      const canvas  = document.getElementById('neon-canvas');
      function resize() {
        const r = wrapper.getBoundingClientRect();
        canvas.width = r.width + 8; canvas.height = r.height + 8;
        canvas.style.left = '-4px'; canvas.style.top = '-4px';
      }
      resize();
      const ctx = canvas.getContext('2d');
      const R = 20;
      function drawRing(w, h, offset, lineW, color, blur) {
        const o = offset;
        ctx.save(); ctx.beginPath();
        ctx.moveTo(o + R, o); ctx.lineTo(w - o - R, o);
        ctx.arcTo(w-o, o, w-o, o+R, R); ctx.lineTo(w-o, h-o-R);
        ctx.arcTo(w-o, h-o, w-o-R, h-o, R); ctx.lineTo(o+R, h-o);
        ctx.arcTo(o, h-o, o, h-o-R, R); ctx.lineTo(o, o+R);
        ctx.arcTo(o, o, o+R, o, R); ctx.closePath();
        ctx.lineWidth = lineW; ctx.strokeStyle = color;
        ctx.shadowColor = color; ctx.shadowBlur = blur; ctx.stroke(); ctx.restore();
      }
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawRing(canvas.width, canvas.height, 2, 2, '#bf00ff', 12);
        requestAnimationFrame(animate);
      }
      animate();
    }
    initCanvas();
  })();

  const boxDrag = document.getElementById('overlay-box'), dragEl = document.getElementById('overlay-wrapper');
  let isDragging = false, startX, startY, startL, startT;

  boxDrag.addEventListener('mousedown', startDragging);
  boxDrag.addEventListener('touchstart', startDragging, { passive: false });

  function startDragging(e) {
    if (['INPUT','BUTTON','A'].includes(e.target.tagName)) return;
    if (e.type === 'touchstart') e.preventDefault();
    isDragging = true;
    const r = dragEl.getBoundingClientRect();
    dragEl.style.transform = 'none'; 
    dragEl.style.left = r.left + 'px'; 
    dragEl.style.top = r.top + 'px';
    startL = r.left; startT = r.top;
    startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
    startY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
    document.addEventListener('mousemove', moveDragging);
    document.addEventListener('touchmove', moveDragging, { passive: false });
    document.addEventListener('mouseup', stopDragging);
    document.addEventListener('touchend', stopDragging);
  }
  function moveDragging(ev) {
    if (!isDragging) return;
    ev.preventDefault(); 
    const cx = ev.type === 'touchmove' ? ev.touches[0].clientX : ev.clientX;
    const cy = ev.type === 'touchmove' ? ev.touches[0].clientY : ev.clientY;
    dragEl.style.left = (startL + cx - startX) + 'px';
    dragEl.style.top = (startT + cy - startY) + 'px';
  }
  function stopDragging() {
    isDragging = false;
    document.removeEventListener('mousemove', moveDragging);
    document.removeEventListener('touchmove', moveDragging);
  }
</script>
</body>
